name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ── Job 1: Format / Lint ──────────────────────────────────────────────────
  format:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Sport.sln

      - name: Format check
        run: dotnet format Sport.sln --verify-no-changes --severity warn

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install Aspire workload
        # Required because AI.sln includes the AppHost project (Aspire MSBuild targets)
        run: dotnet workload install aspire

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore Sport.sln

      - name: Build (Release)
        run: dotnet build Sport.sln -c Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: Src/Api/Sport.Api/bin/Release/
          retention-days: 1

  # ── Job 3: Test ───────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    # Testcontainers spins up its own Docker containers — no extra services needed here.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore Sport.sln

      - name: Test (with coverage)
        run: |
          dotnet test Sport.sln \
            --no-restore \
            -c Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()          # upload even on failure so we can inspect
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

      - name: Publish coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: TestResults/
          fail_ci_if_error: false
