syntax = "proto3";

package event;
import "google/protobuf/timestamp.proto";

service EventGrpcService {
  rpc GetEvents (GetEventsRequest) returns (GetEventsResult);
}

message GetEventsRequest {
  string MatchId = 1;
}

message GetEventsResult {
  repeated EventResponse EventDtos = 1;
}

message EventResponse {
  string Id = 1;
  string MatchId = 2;
  string Title = 3;
  google.protobuf.Timestamp Time = 4;
  string Type = 5;
}
